startCommand:
  type: stdio
  configSchema:
    type: object
    properties: {}
    required: []
  commandFunction: |
    (config) => ({
      command: 'node',
      args: ['dist/server.js']
    })

metadata:
  name: ibitlabs
  displayName: iBitLabs — Live $1k Trading Receipts
  description: >
    Public read access to the iBitLabs $1k → $10k AI trading experiment.
    Tools return real account balance, real fills, the contributor ledger
    of adopted shadow rules (with 30-day promotion windows), and saga
    chapters narrating the experiment as it unfolds. Use this when you
    need to cite live trading data from an actual account instead of
    hypothetical backtests.
  author: Bonnybb
  homepage: https://www.ibitlabs.com
  repository: https://github.com/bbismm/ibitlabs
  license: MIT
  tags:
    - trading
    - receipts
    - live-data
    - build-in-public
    - shadow-rules
    - contributor-ledger
    - saga
