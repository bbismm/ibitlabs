<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | iBitLabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2Z2NW9S800"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-2Z2NW9S800');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#09090f;color:#f1f1f3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
.code{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,15vw,10rem);font-weight:900;background:linear-gradient(135deg,#a78bfa,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h1{font-size:1.5rem;font-weight:800;margin:1rem 0 0.5rem}
p{color:#a8a8be;font-size:0.95rem;max-width:400px;line-height:1.6;margin-bottom:2rem}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.links a{padding:12px 24px;border-radius:10px;font-weight:700;font-size:0.9rem;transition:all 0.2s;text-decoration:none}
.btn-primary{background:#8b5cf6;color:#fff}
.btn-primary:hover{background:#6d28d9;transform:translateY(-2px)}
.btn-secondary{background:transparent;color:#a8a8be;border:1px solid rgba(139,92,246,0.25)}
.btn-secondary:hover{border-color:#8b5cf6;color:#f1f1f3}
.terminal{margin-top:3rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:#787890;max-width:400px;text-align:left;padding:1rem;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06)}
.terminal .prompt{color:#8b5cf6}
.terminal .err{color:#ef4444}
</style>
</head>
<body>
<div class="code">404</div>
<h1>This page doesn't exist.</h1>
<p>Maybe the URL changed, maybe it never existed. Either way, the experiment is still running.</p>
<div class="links">
  <a href="/" class="btn-primary">Back to Experiment</a>
  <a href="/signals" class="btn-secondary">Live Dashboard</a>
</div>
<div class="terminal">
  <div><span class="prompt">$</span> curl ibitlabs.com<span id="path"></span></div>
  <div class="err">404: route not found</div>
  <div><span class="prompt">$</span> # but the bot is still trading...</div>
</div>
<script>document.getElementById('path').textContent=location.pathname;</script>
</body>
</html>
