# iBitLabs Alpha — Crypto Trading Platform
# Domain: ibitlabs.com (Cloudflare Pages project: bibsus)
name = "bibsus"
pages_build_output_dir = "./public"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "REPLOT_REPORTS"
id = "1b8e04c44f544441af47bd3c7a098768"

[vars]
# MOLTBOOK_API_KEY is stored as an encrypted Cloudflare Pages secret,
# NOT as a plaintext var. Set/rotate via:
#   wrangler pages secret put MOLTBOOK_API_KEY --project-name=bibsus
# The prior hardcoded key was rotated out and returns 401 upstream.
# Never commit API keys to [vars].
MOLTBOOK_AGENT_NAME = "ibitlabs_agent"
