# ops domain anti-pattern: blanket-promote new launchd jobs to critical-path
# (ntfy / iMessage / bootout) without a 30-day log-only observation phase.
# Falsified retrospectively by operator stack data 2026-04-29 -> 2026-05-13.
# This is the failure-mode that `ops_launchd_critical_path_gate.yaml` was
# designed to prevent. Archive entry created 2026-05-14 alongside the
# corresponding proposal example.

anti_pattern_id: ops_ungated_critical_path_promotion
domain: ops
original_proposal_id: ops_blanket_critical_path_no_observation
falsified_at: "2026-05-14T00:00:00Z"
falsified_in: "Retrospective audit of 5 critical-path additions in operator's stack 2026-04-29 → 2026-05-13"

evidence:
  - "ghost-watchdog (2026-04-29) — the one critical-path job that had a clean pre-promotion log-only phase. Passed through naturally; no retunings required."
  - "auth_fail_streak (2026-05-08, commit 7aef4b3) — added directly to escalation chain; 1/3/5 streak thresholds tuned by intuition, retuned within 1 week as edge-case fires were observed."
  - "close_verify (2026-05-01) — instrumentation added log-only, but promotion to 'verify close' was de facto critical-path within 24h; window for backing out collapsed."
  - "reporter-reply-check (2026-05-13) — added with 24h silence threshold based on a single observation; threshold relaxed within 14d as normal reply latency variance was observed."
  - "risk_officer 7d DD brake (2026-05-08) — promoted directly to portfolio entry gate with -5/-10/-15 cap tiers; first DD window crossing required cap adjustment within 2 weeks."

why_falsified: |
  4 of 5 critical-path promotions in operator's stack required post-ship
  retunings within 14 days. The pattern is consistent: a real incident
  motivates a new gate; the threshold is set from the single incident;
  production data shows the threshold either over-fires (false-positive
  flood → alert muted / threshold relaxed) or under-fires (false-negative
  miss → threshold tightened). Either retune erodes operator trust in the
  gate, which IS the scarce resource the gate is shipping to protect.

  Only ghost-watchdog — the one job that had a clean log-only pre-phase —
  survived without retuning. The remaining 4 promotions are 4 independent
  instances of the same root failure: skipping the 30-day shadow phase
  saves 30 days at submission time but costs 1-2 weeks of operator
  attention in retune cycles + a measurable hit to trust in the *next*
  gate. The math doesn't work — the gate is shipping to save attention
  but consumes more attention than it saves.

  Generalizable to any alert / escalation system, not just launchd: the
  scarce resource is operator attention, and false positives ratchet
  down trust in the next alert from the same system.

aliases_blocked:
  - ops_skip_shadow_phase
  - ops_trust_operator_judgment_on_threshold
  - ops_one_incident_to_page_on_call
  - ops_blanket_critical_path_promotion
  - ops_threshold_from_single_observation
  - ops_promote_to_escalation_without_observation
  - ops_critical_path_speedrun

next_proposal_check: |
  Before promoting any new launchd job (or analogous escalation source in
  any alert system) to critical-path — ntfy / iMessage / bootout / paging /
  blocking — check this archive AND the `ops_launchd_critical_path_gate`
  proposal in this same examples/ directory. If your rule has not
  accumulated >=30 distinct fires in log-only mode over >=30 days, the
  proposal is auto-rejected at submission. That gate is non-negotiable
  for ops-domain rules.

memory_file: "feedback_no_ungated_critical_path_promotion.md"

memory_index_line: "- [No ungated critical-path promotion](feedback_no_ungated_critical_path_promotion.md) — 4 of 5 recent ops critical-path additions required retunings within 14d. Only ghost-watchdog (clean pre-promotion log-only phase) survived. Skip-shadow saves submit time, costs operator attention + trust. Pre-shadow gate required for any new ntfy/iMessage/bootout escalation."
