# Harness Anti-Pattern Archive — fill out, then archive:
#   python3 harness/bin/archive_falsified.py path/to/this-file.yaml --write

anti_pattern_id: ""                 # snake_case
original_proposal_id: ""            # proposal_id this rule came from
falsified_at: ""                    # ISO 8601 when falsification concluded
falsified_in: ""                    # "30d backtest" / "90d shadow" / "OOS forward test"

evidence:                           # concrete metric statements (>=1)
  - ""
  - ""

why_falsified: |
  Root cause: why does this mechanism fail? Don't just say "doesn't work" — explain the
  structural reason so a future proposer cannot wishfully wave it away.

aliases_blocked:                    # equivalent proposals that should also be rejected
  - ""

next_proposal_check: |
  Before re-proposing anything in this family, the proposer must (a) cite this archive
  and (b) explain why their version is NOT the same anti-pattern.

memory_file: "feedback_xxx_falsified.md"   # written to ~/.claude/.../memory/
memory_index_line: ""                       # one-liner appended to MEMORY.md
