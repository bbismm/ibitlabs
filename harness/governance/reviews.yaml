# Scheduled reviews — drives bin/freeze_status.py
#
# Rule (docs/why.md Operator Rule O1):
#   >=2 reviews close within 7 days = cluster
#   Cluster -> freeze window [first.closes_at - 7d, last.closes_at + 14d]
#   During freeze, changes to schemas/ + bin/ + lib/ must be parked
#
# Update when: a new review is scheduled, or a closed review is no longer
# load-bearing on the freeze (e.g. completed reviews stay listed for at
# least 14d post-close so the freeze tail still applies).

reviews:
